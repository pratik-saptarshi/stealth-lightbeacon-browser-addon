name: test-matrix

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: unit
            command: pnpm run test:unit
          - label: integration
            command: pnpm run test:integration
          - label: backend-fallback
            command: pnpm run test:ci:backend-fallback
          - label: issues:policy
            command: pnpm run test:ci:issues:policy
          - label: required-backend-hard-fail
            command: pnpm run test:ci:required-backend-hard-fail

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Run test leg (${{ matrix.label }})
        run: ${{ matrix.command }}
