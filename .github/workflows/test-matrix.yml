name: test-matrix

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: test-matrix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  test:
    name: test (${{ matrix.label }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: unit
            command: pnpm run test:unit
          - label: integration
            command: pnpm run test:integration
          - label: backend-fallback
            command: pnpm run test:ci:backend-fallback
          - label: issues:policy
            command: pnpm run test:ci:issues:policy
          - label: required-backend-hard-fail
            command: pnpm run test:ci:required-backend-hard-fail

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.4.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Build
        run: |
          set -euo pipefail
          pnpm run build

      - name: Run test leg (${{ matrix.label }})
        run: |
          set -euo pipefail
          ${{ matrix.command }}

  playwright-e2e:
    name: playwright-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.4.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: |
          set -euo pipefail
          pnpm exec playwright install --with-deps chromium

      - name: Build
        run: |
          set -euo pipefail
          pnpm run build

      - name: Run extension runtime smoke (strict Playwright mode)
        run: |
          set -euo pipefail
          pnpm run test:ui-load:strict

      - name: Launch connected Chrome extension runtime
        run: |
          set -euo pipefail
          CHROME_HEADLESS=1 pnpm run launch

      - name: Run Playwright E2E (strict extension origin, connected runtime)
        env:
          PW_REQUIRE_EXTENSION_ORIGIN: "1"
        run: |
          set -euo pipefail
          pnpm run test:side-panel:connected
